<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Tracker - Admin</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="pr-header">
    <h1>Admin Panel</h1>
    <button class="logout-btn" style="background:#555;" onclick="window.location.href='home.html'">Back</button>
</div>

<div class="pr-tabs">
    <div class="pr-tab active" data-tab="fab" onclick="switchTab('fab')">Fab Steps</div>
    <div class="pr-tab" data-tab="paint" onclick="switchTab('paint')">Paint</div>
    <div class="pr-tab" data-tab="units" onclick="switchTab('units')">Units</div>
    <div class="pr-tab" data-tab="inspectors" onclick="switchTab('inspectors')">Inspectors</div>
    <div class="pr-tab" data-tab="workers" onclick="switchTab('workers')">Workers</div>
    <div class="pr-tab" data-tab="jobs" onclick="switchTab('jobs')">Jobs</div>
</div>

<div class="pr-container">

    <!-- FAB STEPS -->
    <div id="tab-fab" class="tab-content">
        <div class="pr-card">
            <label class="pr-label">Add Fab Step</label>
            <input type="text" id="newFabStepName" class="pr-input" placeholder="Step name">
            <input type="number" id="newFabStepOrder" class="pr-input" placeholder="Order number (e.g. 37)">
            <button class="pr-btn pr-btn-primary" onclick="addFabStep()">Add Step</button>
        </div>
        <div id="fabStepsList"><p class="pr-empty">Loading...</p></div>
    </div>

    <!-- PAINT -->
    <div id="tab-paint" class="tab-content" style="display:none;">
        <div class="pr-card">
            <label class="pr-label">Add Paint Item (e.g. Tank, Top Cover)</label>
            <input type="text" id="newPaintItemName" class="pr-input" placeholder="Item name">
            <button class="pr-btn pr-btn-primary" onclick="addPaintItem()">Add Item</button>
        </div>
        <div id="paintItemsList"><p class="pr-empty">Loading...</p></div>

        <div class="pr-card" style="margin-top:16px;">
            <label class="pr-label">Add Paint Process to Item</label>
            <select id="paintProcessItemSelect" class="pr-select"></select>
            <input type="text" id="newPaintProcessName" class="pr-input" placeholder="Process name">
            <input type="number" id="newPaintProcessOrder" class="pr-input" placeholder="Order number">
            <button class="pr-btn pr-btn-primary" onclick="addPaintProcess()">Add Process</button>
        </div>
        <div id="paintProcessesList"></div>
    </div>

    <!-- UNITS -->
    <div id="tab-units" class="tab-content" style="display:none;">
        <div class="pr-card">
            <label class="pr-label">Add Unit</label>
            <input type="text" id="newUnitName" class="pr-input" placeholder="e.g. Unit-3">
            <button class="pr-btn pr-btn-primary" onclick="addUnit()">Add Unit</button>
        </div>
        <div id="unitsList"><p class="pr-empty">Loading...</p></div>
    </div>

    <!-- INSPECTORS -->
    <div id="tab-inspectors" class="tab-content" style="display:none;">
        <div class="pr-card">
            <label class="pr-label">Add Inspector</label>
            <input type="text" id="newInspectorName" class="pr-input" placeholder="Inspector name">
            <button class="pr-btn pr-btn-primary" onclick="addInspector()">Add Inspector</button>
        </div>
        <div id="inspectorsList"><p class="pr-empty">Loading...</p></div>
    </div>

    <!-- WORKERS -->
    <div id="tab-workers" class="tab-content" style="display:none;">
        <div class="pr-card">
            <label class="pr-label">Add Worker</label>
            <input type="text" id="newWorkerName" class="pr-input" placeholder="Worker name">
            <button class="pr-btn pr-btn-primary" onclick="addWorker()">Add Worker</button>
        </div>
        <div id="workersMasterList"><p class="pr-empty">Loading...</p></div>
    </div>

    <!-- JOBS -->
    <div id="tab-jobs" class="tab-content" style="display:none;">
        <div id="jobsList"><p class="pr-empty">Loading...</p></div>
    </div>

</div>

<script src="config.js"></script>
<script>

const session = requireLogin();

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.pr-tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).style.display = 'block';
    document.querySelector('.pr-tab[data-tab="' + tab + '"]').classList.add('active');

    if (tab === 'fab') loadFabSteps();
    if (tab === 'paint') { loadPaintItems(); }
    if (tab === 'units') loadUnits();
    if (tab === 'inspectors') loadInspectors();
    if (tab === 'workers') loadWorkersMaster();
    if (tab === 'jobs') loadJobsAdmin();
}

// ============ FAB STEPS ============
async function loadFabSteps() {
    const container = document.getElementById('fabStepsList');
    container.innerHTML = '<p class="pr-empty">Loading...</p>';
    const { data } = await supabaseClient.from('pr_fab_steps_master').select('*').eq('company_id', session.companyId).order('step_order');

    let html = '<table class="pr-table"><tr><th>#</th><th>Step Name</th><th>Status</th><th></th></tr>';
    (data || []).forEach(s => {
        html += '<tr><td>' + s.step_order + '</td><td>' + s.step_name + '</td>';
        html += '<td><span class="pr-badge pr-badge-' + (s.is_active ? 'accept' : 'reject') + '">' + (s.is_active ? 'Active' : 'Inactive') + '</span></td>';
        html += '<td><button class="pr-btn pr-btn-outline" onclick="toggleActive(\'pr_fab_steps_master\',\'' + s.id + '\',' + s.is_active + ',loadFabSteps)">' + (s.is_active ? 'Deactivate' : 'Activate') + '</button></td></tr>';
    });
    html += '</table>';
    container.innerHTML = html;
}

async function addFabStep() {
    const name = document.getElementById('newFabStepName').value.trim();
    const order = parseInt(document.getElementById('newFabStepOrder').value);
    if (!name || !order) { alert('Enter step name and order number'); return; }
    const { error } = await supabaseClient.from('pr_fab_steps_master').insert({ company_id: session.companyId, step_name: name, step_order: order });
    if (error) { alert('Error: ' + error.message); return; }
    document.getElementById('newFabStepName').value = '';
    document.getElementById('newFabStepOrder').value = '';
    loadFabSteps();
}

// ============ PAINT ITEMS + PROCESSES ============
async function loadPaintItems() {
    const container = document.getElementById('paintItemsList');
    container.innerHTML = '<p class="pr-empty">Loading...</p>';
    const { data } = await supabaseClient.from('pr_paint_items_master').select('*').eq('company_id', session.companyId).order('item_name');

    let html = '<table class="pr-table"><tr><th>Item Name</th><th>Status</th><th></th></tr>';
    (data || []).forEach(i => {
        html += '<tr><td>' + i.item_name + '</td>';
        html += '<td><span class="pr-badge pr-badge-' + (i.is_active ? 'accept' : 'reject') + '">' + (i.is_active ? 'Active' : 'Inactive') + '</span></td>';
        html += '<td><button class="pr-btn pr-btn-outline" onclick="toggleActive(\'pr_paint_items_master\',\'' + i.id + '\',' + i.is_active + ',loadPaintItems)">' + (i.is_active ? 'Deactivate' : 'Activate') + '</button></td></tr>';
    });
    html += '</table>';
    container.innerHTML = html;

    // Populate item selector for adding processes
    const sel = document.getElementById('paintProcessItemSelect');
    sel.innerHTML = '';
    (data || []).filter(i => i.is_active).forEach(i => {
        const opt = document.createElement('option');
        opt.value = i.id;
        opt.textContent = i.item_name;
        sel.appendChild(opt);
    });
    sel.onchange = loadPaintProcesses;
    if (data && data.length > 0) loadPaintProcesses();
}

async function addPaintItem() {
    const name = document.getElementById('newPaintItemName').value.trim();
    if (!name) { alert('Enter item name'); return; }
    const { error } = await supabaseClient.from('pr_paint_items_master').insert({ company_id: session.companyId, item_name: name });
    if (error) { alert('Error: ' + error.message); return; }
    document.getElementById('newPaintItemName').value = '';
    loadPaintItems();
}

async function loadPaintProcesses() {
    const itemId = document.getElementById('paintProcessItemSelect').value;
    const container = document.getElementById('paintProcessesList');
    if (!itemId) { container.innerHTML = ''; return; }
    container.innerHTML = '<p class="pr-empty">Loading...</p>';

    const { data } = await supabaseClient.from('pr_paint_process_master').select('*').eq('paint_item_id', itemId).order('process_order');

    let html = '<table class="pr-table"><tr><th>#</th><th>Process Name</th><th>Status</th><th></th></tr>';
    (data || []).forEach(p => {
        html += '<tr><td>' + p.process_order + '</td><td>' + p.process_name + '</td>';
        html += '<td><span class="pr-badge pr-badge-' + (p.is_active ? 'accept' : 'reject') + '">' + (p.is_active ? 'Active' : 'Inactive') + '</span></td>';
        html += '<td><button class="pr-btn pr-btn-outline" onclick="toggleActive(\'pr_paint_process_master\',\'' + p.id + '\',' + p.is_active + ',loadPaintProcesses)">' + (p.is_active ? 'Deactivate' : 'Activate') + '</button></td></tr>';
    });
    html += '</table>';
    container.innerHTML = html;
}

async function addPaintProcess() {
    const itemId = document.getElementById('paintProcessItemSelect').value;
    const name = document.getElementById('newPaintProcessName').value.trim();
    const order = parseInt(document.getElementById('newPaintProcessOrder').value);
    if (!itemId || !name || !order) { alert('Select item, enter process name and order'); return; }
    const { error } = await supabaseClient.from('pr_paint_process_master').insert({ company_id: session.companyId, paint_item_id: itemId, process_name: name, process_order: order });
    if (error) { alert('Error: ' + error.message); return; }
    document.getElementById('newPaintProcessName').value = '';
    document.getElementById('newPaintProcessOrder').value = '';
    loadPaintProcesses();
}

// ============ UNITS ============
async function loadUnits() {
    const container = document.getElementById('unitsList');
    container.innerHTML = '<p class="pr-empty">Loading...</p>';
    const { data } = await supabaseClient.from('pr_units').select('*').eq('company_id', session.companyId).order('unit_name');

    let html = '<table class="pr-table"><tr><th>Unit Name</th><th>Status</th><th></th></tr>';
    (data || []).forEach(u => {
        html += '<tr><td>' + u.unit_name + '</td>';
        html += '<td><span class="pr-badge pr-badge-' + (u.is_active ? 'accept' : 'reject') + '">' + (u.is_active ? 'Active' : 'Inactive') + '</span></td>';
        html += '<td><button class="pr-btn pr-btn-outline" onclick="toggleActive(\'pr_units\',\'' + u.id + '\',' + u.is_active + ',loadUnits)">' + (u.is_active ? 'Deactivate' : 'Activate') + '</button></td></tr>';
    });
    html += '</table>';
    container.innerHTML = html;
}

async function addUnit() {
    const name = document.getElementById('newUnitName').value.trim();
    if (!name) { alert('Enter unit name'); return; }
    const { error } = await supabaseClient.from('pr_units').insert({ company_id: session.companyId, unit_name: name });
    if (error) { alert('Error: ' + error.message); return; }
    document.getElementById('newUnitName').value = '';
    loadUnits();
}

// ============ INSPECTORS ============
async function loadInspectors() {
    const container = document.getElementById('inspectorsList');
    container.innerHTML = '<p class="pr-empty">Loading...</p>';
    const { data } = await supabaseClient.from('pr_inspectors').select('*').eq('company_id', session.companyId).order('inspector_name');

    let html = '<table class="pr-table"><tr><th>Name</th><th>Status</th><th></th></tr>';
    (data || []).forEach(i => {
        html += '<tr><td>' + i.inspector_name + '</td>';
        html += '<td><span class="pr-badge pr-badge-' + (i.is_active ? 'accept' : 'reject') + '">' + (i.is_active ? 'Active' : 'Inactive') + '</span></td>';
        html += '<td><button class="pr-btn pr-btn-outline" onclick="toggleActive(\'pr_inspectors\',\'' + i.id + '\',' + i.is_active + ',loadInspectors)">' + (i.is_active ? 'Deactivate' : 'Activate') + '</button></td></tr>';
    });
    html += '</table>';
    container.innerHTML = html;
}

async function addInspector() {
    const name = document.getElementById('newInspectorName').value.trim();
    if (!name) { alert('Enter inspector name'); return; }
    const { error } = await supabaseClient.from('pr_inspectors').insert({ company_id: session.companyId, inspector_name: name });
    if (error) { alert('Error: ' + error.message); return; }
    document.getElementById('newInspectorName').value = '';
    loadInspectors();
}

// ============ WORKERS ============
async function loadWorkersMaster() {
    const container = document.getElementById('workersMasterList');
    container.innerHTML = '<p class="pr-empty">Loading...</p>';
    const { data } = await supabaseClient.from('pr_workers').select('*').eq('company_id', session.companyId).order('worker_name');

    let html = '<table class="pr-table"><tr><th>Name</th><th>Status</th><th></th></tr>';
    (data || []).forEach(w => {
        html += '<tr><td>' + w.worker_name + '</td>';
        html += '<td><span class="pr-badge pr-badge-' + (w.is_active ? 'accept' : 'reject') + '">' + (w.is_active ? 'Active' : 'Inactive') + '</span></td>';
        html += '<td><button class="pr-btn pr-btn-outline" onclick="toggleActive(\'pr_workers\',\'' + w.id + '\',' + w.is_active + ',loadWorkersMaster)">' + (w.is_active ? 'Deactivate' : 'Activate') + '</button></td></tr>';
    });
    html += '</table>';
    container.innerHTML = html;
}

async function addWorker() {
    const name = document.getElementById('newWorkerName').value.trim();
    if (!name) { alert('Enter worker name'); return; }
    const { error } = await supabaseClient.from('pr_workers').insert({ company_id: session.companyId, worker_name: name });
    if (error) { alert('Error: ' + error.message); return; }
    document.getElementById('newWorkerName').value = '';
    loadWorkersMaster();
}

// ============ JOBS (Edit / Delete) ============
async function loadJobsAdmin() {
    const container = document.getElementById('jobsList');
    container.innerHTML = '<p class="pr-empty">Loading...</p>';
    const { data } = await supabaseClient.from('pr_jobs').select('*, pr_units(unit_name)').eq('company_id', session.companyId).order('created_at', { ascending: false });

    if (!data || data.length === 0) { container.innerHTML = '<p class="pr-empty">No jobs found.</p>'; return; }

    let html = '';
    data.forEach(j => {
        html += '<div class="pr-card">';
        html += '<label class="pr-label">Job No.</label><input type="text" class="pr-input" id="jobNo_' + j.id + '" value="' + j.job_no + '">';
        html += '<label class="pr-label">Customer</label><input type="text" class="pr-input" id="jobCust_' + j.id + '" value="' + (j.customer_name || '') + '">';
        html += '<label class="pr-label">Status</label><select class="pr-select" id="jobStatus_' + j.id + '">';
        ['Running','Completed','On Hold'].forEach(s => {
            html += '<option value="' + s + '"' + (j.status === s ? ' selected' : '') + '>' + s + '</option>';
        });
        html += '</select>';
        html += '<div style="display:flex; gap:8px; margin-top:8px;">';
        html += '<button class="pr-btn pr-btn-primary" onclick="saveJobEdit(\'' + j.id + '\')">Save Changes</button>';
        html += '<button class="pr-btn pr-btn-danger" onclick="deleteJob(\'' + j.id + '\',\'' + j.job_no + '\')">Delete Job</button>';
        html += '</div></div>';
    });
    container.innerHTML = html;
}

async function saveJobEdit(jobId) {
    const jobNo = document.getElementById('jobNo_' + jobId).value.trim();
    const customer = document.getElementById('jobCust_' + jobId).value.trim();
    const status = document.getElementById('jobStatus_' + jobId).value;
    const { error } = await supabaseClient.from('pr_jobs').update({ job_no: jobNo, customer_name: customer, status: status }).eq('id', jobId);
    if (error) { alert('Error: ' + error.message); return; }
    alert('Saved');
    loadJobsAdmin();
}

async function deleteJob(jobId, jobNo) {
    if (!confirm('Delete job ' + jobNo + ' permanently? This will remove ALL its Fabrication and Painting tracking data too. This cannot be undone.')) return;
    const { error } = await supabaseClient.from('pr_jobs').delete().eq('id', jobId);
    if (error) { alert('Error deleting: ' + error.message); return; }
    loadJobsAdmin();
}

// ============ SHARED TOGGLE ============
async function toggleActive(table, id, currentState, reloadFn) {
    const { error } = await supabaseClient.from(table).update({ is_active: !currentState }).eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    reloadFn();
}

if (session) loadFabSteps();

</script>

</body>
</html>
