<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Tracker - Reset Password</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#1e3a5f;">

<div style="background:#fff; border-radius:14px; padding:30px 24px; width:100%; max-width:360px; box-shadow:0 8px 24px rgba(0,0,0,0.25);">

    <h1 style="text-align:center; font-size:20px; color:#1e3a5f; margin-bottom:20px;">Set New Password</h1>

    <label class="pr-label">New Password</label>
    <input type="password" id="newPasswordInput" class="pr-input" placeholder="Enter new password">

    <label class="pr-label">Confirm Password</label>
    <input type="password" id="confirmPasswordInput" class="pr-input" placeholder="Confirm new password">

    <button onclick="doReset()" class="pr-btn pr-btn-primary" style="width:100%; padding:12px; font-size:15px; margin-top:6px;">Update Password</button>

    <p id="errorMsg" style="color:#d9534f; font-size:13px; text-align:center; margin-top:12px; display:none;"></p>
    <p id="successMsg" style="color:#2e7d32; font-size:13px; text-align:center; margin-top:12px; display:none;"></p>

</div>

<script src="config.js"></script>
<script>

async function doReset() {
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    const newPassword = document.getElementById('newPasswordInput').value;
    const confirmPassword = document.getElementById('confirmPasswordInput').value;

    if (!newPassword || newPassword.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters';
        errorMsg.style.display = 'block';
        return;
    }

    if (newPassword !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match';
        errorMsg.style.display = 'block';
        return;
    }

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

    if (error) {
        errorMsg.textContent = 'Reset link expired or invalid. Request a new one.';
        errorMsg.style.display = 'block';
        return;
    }

    successMsg.textContent = 'Password updated! Redirecting to login...';
    successMsg.style.display = 'block';

    setTimeout(() => {
        window.location.href = 'index.html';
    }, 2000);
}

</script>

</body>
</html>
