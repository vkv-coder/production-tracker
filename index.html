<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Tracker - Login</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#1e3a5f;">

<div style="background:#fff; border-radius:14px; padding:30px 24px; width:100%; max-width:360px; box-shadow:0 8px 24px rgba(0,0,0,0.25);">

    <h1 style="text-align:center; font-size:22px; color:#1e3a5f; margin-bottom:4px;">Production Tracker</h1>
    <p style="text-align:center; font-size:13px; color:#777; margin-bottom:22px;">Fabrication & Painting Tracking</p>

    <div id="loginBox">
        <label class="pr-label">Email</label>
        <input type="email" id="emailInput" class="pr-input" placeholder="Enter email">

        <label class="pr-label">Password</label>
        <input type="password" id="passwordInput" class="pr-input" placeholder="Enter password">

        <button onclick="doLogin()" class="pr-btn pr-btn-primary" style="width:100%; padding:12px; font-size:15px; margin-top:6px;">Login</button>

        <p style="text-align:center; margin-top:14px;">
            <a href="#" onclick="showForgotBox(); return false;" style="font-size:13px; color:#1e3a5f; text-decoration:underline;">Forgot Password?</a>
        </p>
    </div>

    <div id="forgotBox" style="display:none;">
        <label class="pr-label">Enter your registered email</label>
        <input type="email" id="forgotEmailInput" class="pr-input" placeholder="Enter email">
        <button onclick="doForgotPassword()" class="pr-btn pr-btn-primary" style="width:100%; padding:12px; font-size:15px;">Send Reset Link</button>
        <p style="text-align:center; margin-top:14px;">
            <a href="#" onclick="showLoginBox(); return false;" style="font-size:13px; color:#1e3a5f; text-decoration:underline;">Back to Login</a>
        </p>
    </div>

    <p id="errorMsg" style="color:#d9534f; font-size:13px; text-align:center; margin-top:12px; display:none;"></p>
    <p id="successMsg" style="color:#2e7d32; font-size:13px; text-align:center; margin-top:12px; display:none;"></p>

</div>

<script src="config.js"></script>
<script>

function showForgotBox() {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('forgotBox').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
}

function showLoginBox() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('forgotBox').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
}

async function doLogin() {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.style.display = 'none';

    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;

    if (!email || !password) {
        errorMsg.textContent = 'Please enter email and password';
        errorMsg.style.display = 'block';
        return;
    }

    const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
    });

    if (authError || !authData.user) {
        errorMsg.textContent = 'Login failed: incorrect email or password';
        errorMsg.style.display = 'block';
        return;
    }

    // Find matching pr_users record linked to this auth user
    const { data: userData, error: userError } = await supabaseClient
        .from('pr_users')
        .select('id, name, role, company_id')
        .eq('auth_user_id', authData.user.id)
        .eq('is_active', true)
        .maybeSingle();

    if (userError || !userData) {
        errorMsg.textContent = 'Your login is not linked to any company. Contact admin.';
        errorMsg.style.display = 'block';
        return;
    }

    setSession({
        userId: userData.id,
        name: userData.name,
        role: userData.role,
        companyId: userData.company_id
    });

    window.location.href = 'home.html';
}

async function doForgotPassword() {
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    const email = document.getElementById('forgotEmailInput').value.trim();
    if (!email) {
        errorMsg.textContent = 'Please enter your email';
        errorMsg.style.display = 'block';
        return;
    }

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://production.anyapps.in/reset-password.html'
    });

    if (error) {
        errorMsg.textContent = 'Could not send reset link. Try again.';
        errorMsg.style.display = 'block';
        return;
    }

    successMsg.textContent = 'Reset link sent! Check your email.';
    successMsg.style.display = 'block';
}

</script>

</body>
</html>
